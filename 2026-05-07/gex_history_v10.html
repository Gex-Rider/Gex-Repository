<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GEX History</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
:root {
  --bg:      #06090d;
  --bg2:     #0b0f14;
  --bg3:     #0f1419;
  --border:  #1a2332;
  --border2: #243040;
  --text:    #d0d8e4;
  --text2:   #7a8fa8;
  --text3:   #3d5068;
  --accent:  #4a9eff;
  --green:   #22c55e;
  --red:     #ef4444;
  --yellow:  #eab308;
  --cyan:    #22d3ee;
  --magenta: #e879f9;
  --mono:    'JetBrains Mono', monospace;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--mono); font-size:11px;
  min-height:100vh; display:flex; flex-direction:column;
}

/* ── HEADER ── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 16px;
  background:var(--bg2); border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.logo { font-size:13px; font-weight:700; letter-spacing:.12em; color:var(--accent); }
.logo em { color:var(--text2); font-style:normal; font-weight:300; }
.hdr-right { display:flex; align-items:center; gap:10px; }
.live-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--green); box-shadow:0 0 6px var(--green);
  animation:blink 2s infinite;
}
.live-dot.dead { background:var(--red); box-shadow:0 0 6px var(--red); animation:none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
#ts { color:var(--text2); font-size:10px; }
#nbadge {
  font-size:9px; color:var(--text3);
  border:1px solid var(--border); border-radius:2px; padding:2px 6px;
}
#nbadge.flash { color:var(--accent); border-color:var(--accent); }

/* ── TABS ── */
nav {
  display:flex; gap:1px; overflow-x:auto;
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:0 16px; flex-shrink:0;
}
.tab {
  padding:7px 14px; cursor:pointer;
  font-family:var(--mono); font-size:10px; font-weight:600;
  letter-spacing:.1em; color:var(--text2);
  background:transparent; border:none;
  border-bottom:2px solid transparent; white-space:nowrap;
  transition:color .15s, border-color .15s;
}
.tab:hover { color:var(--text); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ── TOOLBAR WRAPPER (collapsible) ── */
.toolbar-wrapper {
  flex-shrink:0; background:var(--bg3); border-bottom:1px solid var(--border);
}
.toolbar-toggle-row {
  display:flex; align-items:center; gap:8px;
  padding:4px 12px; cursor:pointer; user-select:none;
  border-bottom:1px solid transparent; transition:border-color .15s;
}
.toolbar-toggle-row:hover { border-bottom-color:var(--border); }
.toolbar-toggle-label {
  font-size:9px; font-weight:600; letter-spacing:.12em; color:var(--text3);
}
.toolbar-toggle-chevron {
  font-size:10px; color:var(--text3); transition:transform .2s; margin-left:2px;
}
.toolbar-toggle-row.open .toolbar-toggle-chevron { transform:rotate(180deg); }
.toolbar-toggle-row.open .toolbar-toggle-label { color:var(--accent); }

/* ── TOOLBAR ── */
.toolbar {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  /padding:5px 12px 6px;
  overflow:hidden; max-height:0;


  opacity:0;

  transition:
    max-height .25s ease,
    padding .25s ease,
    opacity .2s ease;

  /transition:max-height .25s ease, padding .25s ease;
}
.toolbar.expanded { max-height:200px; padding:5px 12px 7px; opacity:1; }
.toolbar-label { color:var(--text3); font-size:9px; letter-spacing:.1em; margin-right:4px; }
.toolbar-wrapper.collapsed { border-bottom:none;}

/* Signal toggle buttons */
.sig-btn {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 8px; border-radius:2px; cursor:pointer;
  font-family:var(--mono); font-size:9px; font-weight:500;
  letter-spacing:.06em; border:1px solid;
  transition:opacity .15s, background .15s;
  white-space:nowrap; user-select:none;
}
.sig-btn.off { opacity:.28; }
.sig-btn .dot { width:7px; height:7px; border-radius:1px; flex-shrink:0; }

/* right-click style context menu */
.sig-btn:hover { outline:1px solid currentColor; outline-offset:1px; }

.divider-v { width:1px; height:20px; background:var(--border2); margin:0 4px; }

/* ALL / NONE helpers */
.helper-btn {
  padding:3px 8px; font-family:var(--mono); font-size:9px;
  background:transparent; border:1px solid var(--border2);
  color:var(--text2); border-radius:2px; cursor:pointer;
  letter-spacing:.06em;
}
.helper-btn:hover { border-color:var(--accent); color:var(--accent); }
.active-btn { border-color:var(--accent) !important; color:var(--accent) !important; background:#4a9eff12 !important; }

/* Refresh */
.refresh-btn {
  margin-left:auto; padding:3px 8px;
  font-family:var(--mono); font-size:11px; font-weight:600;
  background:transparent; border:1px solid var(--border2);
  color:var(--text2); border-radius:2px; cursor:pointer;
}
.refresh-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── SIGNAL STYLE POPUP ── */
#sig-style-popup {
  position:fixed; z-index:9999;
  background:#0d1520; border:1px solid var(--border2);
  border-radius:4px; padding:10px 12px; min-width:200px;
  box-shadow:0 8px 32px #000a;
  display:none; flex-direction:column; gap:8px;
  font-family:var(--mono); font-size:9px;
}
#sig-style-popup.visible { display:flex; }
.ssp-title {
  font-size:10px; font-weight:700; letter-spacing:.1em;
  color:var(--accent); border-bottom:1px solid var(--border);
  padding-bottom:6px; margin-bottom:2px;
}
.ssp-row { display:flex; align-items:center; gap:8px; }
.ssp-label { color:var(--text3); min-width:52px; letter-spacing:.06em; }
.ssp-val { color:var(--accent); min-width:28px; text-align:right; }
.ssp-slider {
  flex:1; -webkit-appearance:none; appearance:none;
  height:3px; border-radius:2px; outline:none; cursor:pointer;
  background:var(--border2);
}
.ssp-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:10px; height:10px;
  border-radius:50%; background:var(--accent); cursor:pointer;
}
.ssp-color { 
  width:22px; height:22px; border-radius:2px; cursor:pointer;
  border:1px solid var(--border2); background:transparent;
  padding:0; outline:none;
}
.ssp-color::-webkit-color-swatch-wrapper { padding:2px; }
.ssp-color::-webkit-color-swatch { border:none; border-radius:1px; }
.ssp-close {
  align-self:flex-end; background:transparent; border:none;
  color:var(--text3); cursor:pointer; font-size:12px; padding:0;
}
.ssp-close:hover { color:var(--red); }
.ssp-hint { color:var(--text3); font-size:8px; letter-spacing:.04em; margin-top:2px; }

/* ── HEATMAP TOOLBAR ROW ── */
.toolbar-hm {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  padding:4px 12px;
  background:var(--bg2); border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.hm-btn {
  padding:3px 9px; font-family:var(--mono); font-size:9px; font-weight:600;
  letter-spacing:.08em; border-radius:2px; cursor:pointer;
  border:1px solid var(--border2); color:var(--text2);
  background:transparent; transition:all .15s;
}
.hm-btn:hover { border-color:var(--accent); color:var(--accent); }
.hm-btn.hm-active { background:#4a9eff18; border-color:var(--accent); color:var(--accent); }
.hm-btn.hm-off { opacity:.3; }

/* surface type selector */
.hm-type-btn {
  padding:3px 9px; font-family:var(--mono); font-size:9px; font-weight:700;
  letter-spacing:.08em; border-radius:2px; cursor:pointer;
  border:1px solid; transition:all .15s;
}
.hm-type-btn[data-type="GEX"] { border-color:#ef444460; color:#ef4444; }
.hm-type-btn[data-type="VEX"] { border-color:#a78bfa60; color:#a78bfa; }
.hm-type-btn[data-type="DEX"] { border-color:#fb923c60; color:#fb923c; }
.hm-type-btn[data-type="CEX"] { border-color:#22d3ee60; color:#22d3ee; }
.hm-type-btn[data-type="COLOR"] { border-color:#f59e0b60; color:#f59e0b; }
.hm-type-btn[data-type="SPEED"] { border-color:#38bdf860; color:#38bdf8; }
.hm-type-btn[data-type="VOMMA"] { border-color:#38bdf860; color:#38bdf8; }
.hm-type-btn[data-type="ZOMMA"] { border-color:#38bdf860; color:#38bdf8; }
.hm-type-btn.hm-selected[data-type="GEX"] { background:#ef444420; border-color:#ef4444; }
.hm-type-btn.hm-selected[data-type="VEX"] { background:#a78bfa20; border-color:#a78bfa; }
.hm-type-btn.hm-selected[data-type="DEX"] { background:#fb923c20; border-color:#fb923c; }
.hm-type-btn.hm-selected[data-type="CEX"] { background:#22d3ee20; border-color:#22d3ee; }
.hm-type-btn.hm-selected[data-type="COLOR"] { background:#f59e0b20; border-color:#f59e0b; }
.hm-type-btn.hm-selected[data-type="SPEED"] { background:#38bdf820; border-color:#38bdf8; }
.hm-type-btn.hm-selected[data-type="VOMMA"] { background:#38bdf820; border-color:#38bdf8; }
.hm-type-btn.hm-selected[data-type="ZOMMA"] { background:#38bdf820; border-color:#38bdf8; }

/* opacity slider */
.hm-slider-wrap { display:flex; align-items:center; gap:5px; }
.hm-slider-label { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:.06em; }
#hm-opacity-slider {
  -webkit-appearance:none; appearance:none;
  width:72px; height:3px; border-radius:2px;
  background: linear-gradient(to right, var(--accent) 0%, var(--accent) 70%, var(--border2) 70%);
  outline:none; cursor:pointer;
}
#hm-opacity-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:10px; height:10px;
  border-radius:50%; background:var(--accent); cursor:pointer;
}
.hm-opacity-val { font-family:var(--mono); font-size:9px; color:var(--accent); min-width:22px; }

/* loading indicator for heatmap */
.hm-status { font-family:var(--mono); font-size:9px; color:var(--text3); margin-left:4px; }
.hm-time-wrap { display:flex; align-items:center; gap:5px; }
.hm-time-input {
  font-family:var(--mono); font-size:9px; font-weight:600;
  background:#0b0f14; border:1px solid var(--border2);
  color:var(--accent); border-radius:2px; padding:2px 6px;
  width:52px; text-align:center; outline:none; cursor:text;
  letter-spacing:.06em;
}
.hm-time-input:focus { border-color:var(--accent); }
.hm-anchor-badge {
  font-family:var(--mono); font-size:8px; color:var(--text3);
  border:1px solid var(--border); border-radius:2px; padding:1px 5px;
  white-space:nowrap; min-width:70px; text-align:center;
}

/* ── MAIN ── */
html, body { height:100%; overflow:hidden; }
main { flex:1; overflow:hidden; position:relative; }
.panel { display:none; position:absolute; inset:0; }
.panel.active { display:block; }
.plotly-chart { width:100%; height:100%; }

/* ── STATUS / ERROR ── */
#status {
  display:flex; align-items:center; justify-content:center;
  height:100%; gap:12px; color:var(--text2); flex-direction:column;
}
.spinner { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#err {
  display:none; margin:20px; padding:10px 14px;
  border:1px solid var(--red); background:#ef444410; color:var(--red);
  border-radius:3px; font-size:11px; white-space:pre-wrap;
}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="live-dot" id="ldot"></div>
    <div class="logo">GEX <em>HISTORY</em></div>
  </div>
  <div class="hdr-right">
    <a href="greek_surfaces_guide.html" target="_blank"
       style="font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;
              color:var(--text3);border:1px solid var(--border);border-radius:2px;
              padding:3px 8px;text-decoration:none;transition:color .15s,border-color .15s;"
       onmouseover="this.style.color='var(--accent)';this.style.borderColor='var(--accent)'"
       onmouseout="this.style.color='var(--text3)';this.style.borderColor='var(--border)'">
      GREEKS GUIDE
    </a>
    <a href="signals_guide.html" target="_blank"
       style="font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;
              color:var(--text3);border:1px solid var(--border);border-radius:2px;
              padding:3px 8px;text-decoration:none;transition:color .15s,border-color .15s;"
       onmouseover="this.style.color='var(--accent)';this.style.borderColor='var(--accent)'"
       onmouseout="this.style.color='var(--text3)';this.style.borderColor='var(--border)'">
      SIGNALS GUIDE
    </a>
    <span id="ts">--:--:--</span>
    <span id="nbadge">AUTO 60s</span>
  </div>
</header>

<nav id="tabs-nav"></nav>

<!-- ── SIGNALS (collapsible) ── -->
<div class="toolbar-wrapper">
  <div class="toolbar-toggle-row" id="toolbar-toggle" onclick="toggleToolbar()">
    <span class="toolbar-toggle-label">SEÑALES</span>
    <span class="toolbar-toggle-chevron">▾</span>
    <span style="font-size:8px;color:var(--text3);margin-left:4px;">(right-click señal → estilo)</span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
      <button class="helper-btn hover-btn" id="btn-hover" style="font-size:9px;"
              onclick="event.stopPropagation();toggleHover()" title="Toggle hover">HOVER ○</button>
      <button class="refresh-btn" style="font-size:11px;"
              onclick="event.stopPropagation();refreshAll()" title="Refrescar datos">↺</button>
    </div>
  </div>
  <div class="toolbar" id="toolbar">
    <!-- buttons injected by JS -->
  </div>
</div>

<!-- ── SIGNAL STYLE POPUP ── -->
<div id="sig-style-popup">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <span class="ssp-title" id="ssp-title">SIGNAL</span>
    <button class="ssp-close" onclick="closeSigStyle()">✕</button>
  </div>
  <div class="ssp-row">
    <span class="ssp-label">COLOR</span>
    <input type="color" class="ssp-color" id="ssp-color" oninput="applySigStyle()">
    <span class="ssp-hint">color del marcador</span>
  </div>
  <div class="ssp-row">
    <span class="ssp-label">TAMAÑO</span>
    <input type="range" class="ssp-slider" id="ssp-size" min="1" max="30" step="1" oninput="applySigStyle()">
    <span class="ssp-val" id="ssp-size-val">—</span>
  </div>
  <div class="ssp-row">
    <span class="ssp-label">OPACIDAD</span>
    <input type="range" class="ssp-slider" id="ssp-opacity" min="0" max="100" step="5" oninput="applySigStyle()">
    <span class="ssp-val" id="ssp-opacity-val">—</span>
  </div>
  <div class="ssp-hint" style="margin-top:4px;">Click fuera para cerrar</div>
</div>

<!-- ── HEATMAP CONTROL BAR ── -->
<div class="toolbar-hm" id="toolbar-hm">
  <span class="toolbar-label">SURFACE</span>

  <!-- ON/OFF toggle -->
  <button class="hm-btn" id="hm-toggle" onclick="toggleHeatmap()">HM OFF</button>

  <div class="divider-v"></div>

  <!-- INV mode toggle -->
  <button class="hm-btn" id="hm-inv-toggle" onclick="toggleInvMode()" title="Cambiar entre archivos *_heatmap_* y *_HEATMAP_INV_*">INV</button>
  <span class="hm-slider-label" id="hm-mode-label" style="font-size:8px;color:var(--text3)">LIVE</span>

  <div class="divider-v"></div>

  <!-- Surface type buttons -->
  <button class="hm-type-btn" data-type="GEX" onclick="selectHmType('GEX')">GEX</button>
  <button class="hm-type-btn" data-type="VEX" onclick="selectHmType('VEX')">VEX</button>
  <button class="hm-type-btn" data-type="DEX" onclick="selectHmType('DEX')">DEX</button>
  <button class="hm-type-btn" data-type="CEX" onclick="selectHmType('CEX')">CEX</button>
  <button class="hm-type-btn" data-type="COLOR" onclick="selectHmType('COLOR')">COLOR</button>
  <button class="hm-type-btn" data-type="SPEED" onclick="selectHmType('SPEED')">SPEED</button>
  <button class="hm-type-btn" data-type="VOMMA" onclick="selectHmType('VOMMA')">VOMMA</button>
  <button class="hm-type-btn" data-type="ZOMMA" onclick="selectHmType('ZOMMA')">ZOMMA</button>

  <div class="divider-v"></div>

  <!-- Opacity slider -->
  <div class="hm-slider-wrap">
    <span class="hm-slider-label">OPAC</span>
    <input type="range" id="hm-opacity-slider" min="5" max="100" value="70"
           oninput="onHmOpacity(this.value)">
    <span class="hm-opacity-val" id="hm-opacity-val">25%</span>
  </div>

  <div class="divider-v"></div>

  <!-- Colorscale selector -->
  <span class="hm-slider-label">COLOR</span>
  <button class="hm-btn hm-active" id="cs-rdgr" onclick="selectColorscale('RdGr')">R/G</button>
  <button class="hm-btn" id="cs-rdbu" onclick="selectColorscale('RdBu')">R/B</button>
  <button class="hm-btn" id="cs-plasma" onclick="selectColorscale('Plasma')">PLASMA</button>

  <div class="divider-v"></div>
  <div class="hm-time-wrap">
    <span class="hm-slider-label">CLOSE</span>
    <input type="time" class="hm-time-input" id="hm-close-time"
           value="15:00" onchange="onHmCloseTime(this.value)"
           title="Hora LOCAL cuando el mercado cierra en tu pantalla">
    <span class="hm-anchor-badge" id="hm-anchor-badge">──:──→──:──</span>
  </div>
  <span class="hm-status" id="hm-status"></span>
</div>

<main>
  <div id="status"><div class="spinner"></div><span>Buscando archivos CSV…</span></div>
  <div id="err"></div>
  <div id="panels"></div>
</main>

<script>
// ══════════════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════════════
const ACTIVOS    = ['SPY','QQQ','SPX','NDX','ES','NQ','RTY'];
const CSV_FOLDER = '';          // same folder; set to 'Sync/' if needed
const REFRESH_MS = 60000;

//'#4a9eff',
// Signal definitions — color / symbol / group / opacity
// Color palette:
//   Cyan  soft : #67e8f9  (sky-300)  → Long / Buy side
//   Purple soft: #d8b4fe  (violet-300) → Short / Sell side
// Shape logic:
//   ▲ filled  = Long Calls / Buy Calls   (up = bullish, filled = position held)
//   △ open    = Short Calls / Sell Calls (up = calls, open = sold)
//   ▼ filled  = Long Puts  / Buy Puts    (down = bearish, filled = position held)
//   ▽ open    = Short Puts / Sell Puts   (down = puts, open = sold)
// opacity: 0.0–1.0 por señal (si no se define, usa MARKER_OPACITY)
const SIGNALS = {
  SPOT:       { color:'#f8f8f8',  sym:null,                group:'SPOT',    size:0,  line:true },
  MAXGEX:     { color:'#ef4444',  sym:'square-open',       group:'GEX',     size:12,  opacity:1  },
  MINGEX:     { color:'#22c55e',  sym:'square-open',       group:'GEX',     size:12,  opacity:1 },
  MAXVEX:     { color:'#ef4444',  sym:'square-open',       group:'VEX',     size:8,  opacity:1  },
  MINVEX:     { color:'#22c55e',  sym:'square-open',       group:'VEX',     size:8,  opacity:1  },
  MAXDEX:     { color:'#ef4444',  sym:'hexagon-open',      group:'DEX',     size:16, opacity:0.25  },
  MINDEX:     { color:'#22c55e',  sym:'hexagon-open',      group:'DEX',     size:16, opacity:0.25  },
  ZERO:       { color:'#eab308',  sym:'circle-open',       group:'ZERO',    size:2,  opacity:0.9  },
  MAXCP:      { color:'#ef4444',  sym:'circle-open',            group:'CP',      size:2,  opacity:0.9  },
  MINCP:      { color:'#22c55e',  sym:'circle-open',            group:'CP',      size:2,  opacity:0.9  },
  // FLOW — ▲ filled=Buy, ▽ open=Sell | cyan=Calls, purple=Puts
  BAC:        { color:'#67e8f9',  sym:'triangle-up',       group:'FLOW',    size:8,  opacity:0.7  },  // Buy Calls  ▲ cyan
  SAC:        { color:'#d8b4fe',  sym:'triangle-up',  group:'FLOW',    size:8,  opacity:0.7  },  // Sell Calls △ cyan open
  BAP:        { color:'#67e8f9',  sym:'triangle-down',     group:'FLOW',    size:8,  opacity:0.7  },  // Buy Puts   ▼ purple
  SAP:        { color:'#d8b4fe',  sym:'triangle-down',group:'FLOW',    size:8,  opacity:0.7  },  // Sell Puts  ▽ purple open
  // GAMMA — cross filled=Long, cross-open=Short
  LONGGAMMA:  { color:'#7cf9ff',  sym:'cross',             group:'GAMMA',   size:4,  opacity:0.9  },  // cyan
  SHORTGAMMA: { color:'#e9cfff',  sym:'cross',        group:'GAMMA',   size:4,  opacity:0.9  },  // purple
  // INV — ▲/△=Calls  ▼/▽=Puts  |  filled=Long  open=Short
  LONGCALLS:  { color:'#7cf9ff',  sym:'triangle-up-open',       group:'INV',     size:14, opacity:0.25  },  // ▲ cyan filled

      hiddenSigs:    [...hiddenSigs],
      hmEnabled,
      hmType,
      hmOpacity,
      hmColorscale,
      hmCloseTimeStr,
      hmInvMode,

    localStorage.setItem(LS_KEY, JSON.stringify(payload));

    // Hidden signals
    if (Array.isArray(s.hiddenSigs)) {

    // Heatmap state
    if (typeof s.hmEnabled    === 'boolean') hmEnabled    = s.hmEnabled;
    if (typeof s.hmType       === 'string')  hmType       = s.hmType;
    if (typeof s.hmOpacity    === 'number')  hmOpacity    = s.hmOpacity;
    if (typeof s.hmColorscale === 'string')  hmColorscale = s.hmColorscale;
    if (typeof s.hmCloseTimeStr === 'string') hmCloseTimeStr = s.hmCloseTimeStr;

/**
 * Parses the surface CSV generated by GEX_Surface.py
 *
 * Format:
 *   "" (empty), 390, 387, 384, ... , 0   ← header row (column = minutes)
 *   "540.5", val, val, val, ...           ← rows (index = strike price)
 *
 * Returns { strikes: [float], minutes: [int], z: [[row values]] }
 * where z[i][j] = value at strike[i], minute[j]
 */
function parseSurfaceCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return null;

  // Header: first cell is empty (row index label), rest are minute values
  const headerCells = lines[0].split(',');
  const minutes = headerCells.slice(1).map(v => parseFloat(v.trim())).filter(v => !isNaN(v));

  const strikes = [];
  const z       = [];

  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i].split(',');
    if (!cells[0]) continue;
    const strike = parseFloat(cells[0].replace(/"/g, '').trim());
    if (isNaN(strike)) continue;

    const row = cells.slice(1).map(v => {
      const n = parseFloat(v.trim());
      return isNaN(n) ? 0 : n;
    });

    // Pad/trim to match minutes length
    while (row.length < minutes.length) row.push(0);
    strikes.push(strike);
    z.push(row.slice(0, minutes.length));
  }

  return { strikes, minutes, z };
}

async function loadHeatmapData(activo, type , force = false) {
  if (!activo) return;

  const key = activo + '_' + type;
  //if (hmCache[activo]?.[type]) return;   // already cached
  if (!force && hmCache[activo]?.[type]) return;
  if (hmLoading[key]) return;            // already in flight

  hmLoading[key] = true;
  setHmStatus(`⟳ ${activo} ${type}…`);

  const suffix = (hmInvMode ? HM_CSV_SUFFIX_INV : HM_CSV_SUFFIX)[type];
  const url    = CSV_FOLDER + activo.toLowerCase() + suffix + '?_=' + Date.now();

  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const text = await r.text();
    const data = parseSurfaceCSV(text);
    if (!data) throw new Error('parse error');

    if (!hmCache[activo]) hmCache[activo] = {};
    hmCache[activo][type] = data;
    setHmStatus(`✓ ${activo} ${type}`);
    setTimeout(() => setHmStatus(''), 2000);
  } catch(e) {
    setHmStatus(`✗ ${activo} ${type}: ${e.message}`);
    setTimeout(() => setHmStatus(''), 4000);
  } finally {
    hmLoading[key] = false;
  }
}

// ══════════════════════════════════════════════════════════════════════
//  TIMESTAMP PARSING — sin ambigüedad de zona horaria
//
//  El CSV del engine guarda: "2026-04-29 09:00:00" (sin Z, sin T)
//  new Date("2026-04-29 09:00:00") → comportamiento INCONSISTENTE entre
//  browsers: algunos lo tratan como UTC, otros como local.
//
//  Solución: parseamos manualmente → siempre como número LOCAL puro
//  (milisegundos desde epoch, misma referencia que new Date(y,m,d,h,mi))
// ══════════════════════════════════════════════════════════════════════

/**
 * Parsea "YYYY-MM-DD HH:MM:SS" como hora LOCAL del browser.
 * Equivalente a new Date(y,m,d,h,mi,s) pero acepta el string del CSV.
 * NO hay conversión UTC — el número resultante es comparable directamente
 * con new Date(y, m, d, hh, mm).getTime() usado en getCloseTimestamp().
 */
function parseLocalTs(str) {
  // "2026-04-29 09:00:00" o "2026-04-29T09:00:00"
  const s = str.replace('T', ' ').trim();
  const [datePart, timePart] = s.split(' ');
  const [y, mo, d]  = datePart.split('-').map(Number);
  const [h, mi, sc] = (timePart || '00:00:00').split(':').map(Number);
  return new Date(y, mo - 1, d, h, mi, sc || 0).getTime();
}

// Hora de cierre definida por el usuario (HH:MM en tiempo local)
let hmCloseTimeStr = '15:00';

function onHmCloseTime(val) {

/**
 * Dado el último registro del CSV, construye el timestamp del cierre
 * usando la hora que el usuario definió — todo en tiempo LOCAL.
 *
 * Mismo espacio de referencia que parseLocalTs() → no hay desfase.
 */
function getCloseTs(rows) {
  const times = rows.map(r => parseLocalTs(r.Time)).filter(t => !isNaN(t));
  if (!times.length) return null;
  const lastMs = Math.max(...times);
  const d      = new Date(lastMs);
  const [hh, mm] = hmCloseTimeStr.split(':').map(Number);
  return new Date(d.getFullYear(), d.getMonth(), d.getDate(), hh, mm, 0).getTime();
}

function updateAnchorBadge() {
  const badge = document.getElementById('hm-anchor-badge');
  if (!badge) return;
  const data  = currentTab ? hmCache[currentTab]?.[hmType] : null;
  const mMax  = data ? Math.max(...data.minutes) : 390;
  const [hh, mm] = hmCloseTimeStr.split(':').map(Number);
  const openMs   = new Date(2000, 0, 1, hh, mm).getTime() - mMax * 60000;
  const od       = new Date(openMs);
  const openStr  = String(od.getHours()).padStart(2,'0') + ':' + String(od.getMinutes()).padStart(2,'0');
  badge.textContent = openStr + '→' + hmCloseTimeStr;
}

// ══════════════════════════════════════════════════════════════════════
//  BUILD HEATMAP TRACE
// ══════════════════════════════════════════════════════════════════════

function buildHeatmapTrace(activo, rows) {
  if (!hmEnabled) return null;
  const data = hmCache[activo]?.[hmType];
  if (!data || !data.z.length) return null;

  const { strikes, minutes, z } = data;

  // ── Anchor en tiempo local puro ───────────────────────────────────
  // parseLocalTs() → ms locales  /  getCloseTs() → ms locales
  // Ambos en el mismo espacio → sin desfase de TZ
  const tClose = getCloseTs(rows);
  if (!tClose) return null;

  const mMax = Math.max(...minutes);

  // minutes=0 → tClose (cierre del usuario)
  // minutes=M → tClose - M minutos
  // Emit as local datetime string (no Z) so Plotly treats same as scatter x values
  function toLocalISOStr(ms) {
    const d = new Date(ms);
    const pad = n => String(n).padStart(2,'0');
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+
           'T'+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
  }
  const xDates = minutes.map(m => toLocalISOStr(tClose - m * 60 * 1000));

  // ── Colorscale ────────────────────────────────────────────────────
  const cs = COLORSCALES[hmColorscale] || COLORSCALES.RdGr;

  // ── Symmetric z normalization ──────────────────────────────────────
  // Center colorscale at 0 so positive=green/red and negative=opposite
  const allVals = z.flat().filter(v => isFinite(v) && v !== 0);
  const absMax  = allVals.length ? Math.max(...allVals.map(Math.abs)) : 1;

  return {
    type:        'heatmap',
    x:           xDates,
    y:           strikes,
    z:           z,
    zmin:        -absMax,
    zmax:        absMax,
    zmid:        0,
    colorscale:  cs,
    showscale:   false,       // hide colorbar to keep chart clean
    opacity:     hmOpacity,
    hoverinfo:   'skip',      // don't interfere with scatter hover
    name:        `${hmType} Surface`,
    xgap:        0,
    ygap:        0,
  };
}

// ══════════════════════════════════════════════════════════════════════
//  CSV PARSER
// ══════════════════════════════════════════════════════════════════════
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => {
      const v = (vals[i] || '').trim();
      obj[h] = v === '' ? null : isNaN(+v) ? v : +v;
    });
    return obj;
  }).filter(r => r.Time)
   .map(r => {
     // Normalise Time: "2026-04-29 09:00:00" → "2026-04-29T09:00:00"
     // WITHOUT trailing Z so Plotly treats it as local, not UTC.
     if (r.Time && typeof r.Time === 'string') {
       r.Time = r.Time.trim().replace(' ', 'T');
     }
     return r;
   });
}

async function loadAll() {
  setStatus('Cargando CSVs…');
  const found = [];

  await Promise.all(ACTIVOS.map(async a => {
    const url = CSV_FOLDER + a.toLowerCase() + '_gex_history.csv?_=' + Date.now();
    try {
      const r = await fetch(url);
      if (!r.ok) return;
      const text = await r.text();
      const rows = parseCSV(text);
      if (rows.length > 0) {
        csvCache[a] = rows;
        found.push(a);
      }
    } catch(e) { /* file not found, skip */ }
  }));

  if (!found.length) {
    showError('No se encontraron archivos *_gex_history.csv\n' +
      'Pon este HTML en la misma carpeta que los CSV (E:\\GEX\\Sync\\)\n' +
      'o usa python -m http.server 8080 desde esa carpeta.');
    return;
  }

  document.getElementById('ldot').className = 'live-dot';
  document.getElementById('status').style.display = 'none';
  document.getElementById('err').style.display = 'none';

  // Sort found activos to match ACTIVOS order (fixed, stable order)
  found.sort((a, b) => ACTIVOS.indexOf(a) - ACTIVOS.indexOf(b));

  if (!currentTab || !found.includes(currentTab)) currentTab = found[0];

  // Only build tabs/panels on first load or if the set of activos changed
  const prevActivos = _builtActivos.join(',');
  const nextActivos = found.join(',');
  if (prevActivos !== nextActivos) {
    buildTabs(found);
    buildPanels(found);
    _builtActivos = found;
  }

  // If heatmap is already enabled, pre-load for current tab
  if (hmEnabled && currentTab) {
    await loadHeatmapData(currentTab, hmType);
  }

  replot();
  flashBadge();
}

// ══════════════════════════════════════════════════════════════════════
//  TABS & PANELS
// ══════════════════════════════════════════════════════════════════════
function buildTabs(activos) {
  const nav = document.getElementById('tabs-nav');
  nav.innerHTML = '';
  activos.forEach(a => {
    const b = document.createElement('button');
    b.className = 'tab' + (a === currentTab ? ' active' : '');
    b.textContent = a;
    b.onclick = async () => {
      currentTab = a;
      activateTab(a);
      // Pre-load heatmap for newly activated tab
      if (hmEnabled) await loadHeatmapData(a, hmType);
      replot();
    };
    nav.appendChild(b);
  });
}

function buildPanels(activos) {
  const c = document.getElementById('panels');
  c.innerHTML = '';
  // DOM was nuked — clear listener tracking so _attachZoomListener re-registers
  _zoomListeners.clear();
  activos.forEach(a => {
    const div = document.createElement('div');
    div.className = 'panel' + (a === currentTab ? ' active' : '');
    div.id = 'panel-' + a;
    div.innerHTML = `<div id="chart-${a}" class="plotly-chart"></div>`;
    c.appendChild(div);
  });
  requestAnimationFrame(fixChartHeights);
}

function fixChartHeights() {
  const main = document.querySelector('main');
  const h = main.getBoundingClientRect().height;
  if (h < 10) return;
  ACTIVOS.forEach(a => {
    const el = document.getElementById('chart-' + a);
    if (el) { el.style.height = h + 'px'; }
  });
}

function activateTab(a) {
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.textContent === a));
  document.querySelectorAll('.panel').forEach(p =>
    p.classList.toggle('active', p.id === 'panel-' + a));
}

// ══════════════════════════════════════════════════════════════════════
//  PLOT
// ══════════════════════════════════════════════════════════════════════

// zoomState[activo] = { x:[x0,x1], y:[y0,y1] } — undefined means autorange
const zoomState = {};
// Track which chart divs already have the listener to avoid duplicates
const _zoomListeners = new Set();

function _attachZoomListener(activo) {
  if (_zoomListeners.has(activo)) return;
  _zoomListeners.add(activo);
  const el = document.getElementById('chart-' + activo);
  if (!el) return;
  el.on('plotly_relayout', (evtData) => {
    if (evtData['xaxis.range[0]'] !== undefined) {
      const cur = zoomState[activo] || {};
      zoomState[activo] = {
        x: [evtData['xaxis.range[0]'], evtData['xaxis.range[1]']],
        y: cur.y ?? null,
      };
    }
    if (evtData['yaxis.range[0]'] !== undefined) {
      const cur = zoomState[activo] || {};
      zoomState[activo] = {
        x: cur.x ?? null,
        y: [evtData['yaxis.range[0]'], evtData['yaxis.range[1]']],
      };
    }
    if (evtData['xaxis.autorange'] === true || evtData['yaxis.autorange'] === true) {
      delete zoomState[activo];
    }
  });
}

function replot() {
  if (!currentTab || !csvCache[currentTab]) return;
  const rows = csvCache[currentTab];
  const el   = document.getElementById('chart-' + currentTab);
  if (!el) return;

  // Snapshot current zoom from live Plotly layout BEFORE we overwrite it
  // This is the most reliable source — works even if relayout event was missed
  if (el._fullLayout) {
    const xl = el._fullLayout.xaxis, yl = el._fullLayout.yaxis;
    if (xl && !xl.autorange && Array.isArray(xl.range) && xl.range.length === 2) {
      zoomState[currentTab] = zoomState[currentTab] || {};
      zoomState[currentTab].x = [...xl.range];
    }
    if (yl && !yl.autorange && Array.isArray(yl.range) && yl.range.length === 2) {
      zoomState[currentTab] = zoomState[currentTab] || {};
      zoomState[currentTab].y = [...yl.range];
    }
  }

  const traces = buildTraces(rows);
  const layout = buildLayout(currentTab, rows);

  // Re-apply saved zoom so data refresh doesn't reset the view
  const saved = zoomState[currentTab];
  if (saved) {
    if (saved.x) { layout.xaxis.range = saved.x; layout.xaxis.autorange = false; }
    if (saved.y) { layout.yaxis.range = saved.y; layout.yaxis.autorange = false; }
  }

  Plotly.react(el, traces, layout, {
    responsive: true,
    displayModeBar: true,
    modeBarButtonsToRemove: ['toImage','sendDataToCloud'],
    displaylogo: false,
  });

  // Attach relayout listener once per chart div
  _attachZoomListener(currentTab);
}

function buildTraces(rows) {
  const times  = rows.map(r => r.Time);
  const traces = [];

  // ── 1. Heatmap trace — always FIRST so it renders behind everything ──
  const hmTrace = buildHeatmapTrace(currentTab, rows);
  if (hmTrace) traces.push(hmTrace);

  // ── 2. Signal scatter traces ──────────────────────────────────────
  Object.entries(SIGNALS).forEach(([key, def]) => {
    const visible = !hiddenSigs.has(key);
    const ov = sigStyleOverrides[key] || {};
    const color   = ov.color   ?? def.color;
    const sigSize = ov.size    ?? def.size ?? 9;
    const sigOp   = ov.opacity ?? def.opacity ?? MARKER_OPACITY;

    if (def.line) {
      traces.push({
        x: times,
        y: rows.map(r => r[key]),
        name: key,
        type: 'scatter',
        mode: 'lines',
        line: { color, width: 2 },
        visible: visible ? true : 'legendonly',
        legendgroup: def.group,
        hovertemplate: `<b>${key}</b> %{y:.0f}<extra></extra>`,
      });
    } else {
      const xVals = [], yVals = [];
      rows.forEach(r => {
        const v = r[key];
        if (v !== null && v !== 0) {
          xVals.push(r.Time);
          yVals.push(v);
        }
      });
      if (xVals.length === 0) return;

      traces.push({
        x: xVals,
        y: yVals,
        name: key,
        type: 'scatter',
        mode: 'markers',
        marker: {
          color,
          symbol: def.sym,
          size: sigSize,
          line: { color, width: 1.5 },
          opacity: sigOp,
        },
        visible: visible ? true : 'legendonly',
        legendgroup: def.group,
        hovertemplate: `<b>${key}</b> %{y:.0f}<extra></extra>`,
      });
    }
  });

  return traces;
}

function buildLayout(activo, rows) {
  const allVals = [];
  Object.keys(SIGNALS).forEach(k => {
    rows.forEach(r => {
      const v = r[k];
      if (v !== null && v !== undefined && v !== 0 && isFinite(v)) allVals.push(v);
    });
  });

  const yMin = allVals.length ? Math.min(...allVals) * 0.997 : 0;
  const yMax = allVals.length ? Math.max(...allVals) * 1.003 : 1000;

  // Heatmap label badge in title
  const hmLabel = hmEnabled ? ` · <span style="opacity:.6">${hmType} SURFACE ${Math.round(hmOpacity*100)}%</span>` : '';

  return {
    autosize: true,
    paper_bgcolor: '#06090d',
    plot_bgcolor:  '#0b0f14',
    font: { family: 'JetBrains Mono, monospace', color: '#7a8fa8', size: 10 },
    title: {
      text: `${activo} — GEX History${hmEnabled ? ' + ' + hmType + ' Surface' : ''}`,
      font: { color: '#d0d8e4', size: 14, weight: 600 },
      x: 0.02, xanchor: 'left',
    },
    margin: { l:60, r:20, t:44, b:46 },
    xaxis: {
      type: 'date',
      color: '#9fb3c8',
      gridcolor: '#1a2332',
      tickfont: { size:9 },
      showgrid: true,
      zeroline: false,
      autorange: true,
    },
    yaxis: {
      title: { text: 'Strike / Nivel', font:{color:'#9fb3c8',size:9}, standoff:8 },
      color: '#9fb3c8',
      gridcolor: '#1a2332',
      tickfont: { size:9 },
      zeroline: false,
      range: [yMin, yMax],
    },
    showlegend: false,
    hovermode: hoverOn ? 'closest' : false,
    hoverlabel: {
      bgcolor: '#000000',
      bordercolor: '#22d3ee',
      font: { family: 'JetBrains Mono, monospace', size:11 },
    },
    dragmode: 'pan',
    shapes:      hmEnabled ? _sessionShapes(rows) : [],
    annotations: hmEnabled ? _sessionAnnotations(rows) : [],
  };
}

// ══════════════════════════════════════════════════════════════════════
//  SESSION BOUNDARY LINES
// ══════════════════════════════════════════════════════════════════════
function _localIsoStr(ms) {
  const d = new Date(ms), p = n => String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+
         'T'+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}
function _sessionBounds(rows) {
  const tClose = getCloseTs(rows);
  if (!tClose) return null;
  const data = currentTab ? hmCache[currentTab]?.[hmType] : null;
  const mMax = data ? Math.max(...data.minutes) : 390;
  return { tOpen: tClose - mMax * 60000, tClose };
}
function _sessionShapes(rows) {
  const b = _sessionBounds(rows);
  if (!b) return [];
  return [
    { type:'line', xref:'x', yref:'paper',
      x0:_localIsoStr(b.tOpen),  x1:_localIsoStr(b.tOpen),  y0:0, y1:1,
      line:{ color:'#22c55e55', width:1, dash:'dot' } },
    { type:'line', xref:'x', yref:'paper',
      x0:_localIsoStr(b.tClose), x1:_localIsoStr(b.tClose), y0:0, y1:1,
      line:{ color:'#ef4444aa', width:1.5, dash:'dot' } },
  ];
}
function _sessionAnnotations(rows) {
  const b = _sessionBounds(rows);
  if (!b) return [];
  const fmt = ms => { const d=new Date(ms); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); };
  return [
    { xref:'x', yref:'paper', x:_localIsoStr(b.tOpen),  y:1.01,
      text:'OPEN '+fmt(b.tOpen), showarrow:false,
      font:{family:'JetBrains Mono',size:8,color:'#22c55eaa'}, xanchor:'left',  yanchor:'bottom' },
    { xref:'x', yref:'paper', x:_localIsoStr(b.tClose), y:1.01,
      text:'CLOSE '+fmt(b.tClose), showarrow:false,
      font:{family:'JetBrains Mono',size:8,color:'#ef4444cc'}, xanchor:'right', yanchor:'bottom' },
  ];
}

// ══════════════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════════════
function setStatus(msg) {
  const s = document.getElementById('status');
  s.style.display = 'flex';
  s.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
}
function showError(msg) {
  document.getElementById('ldot').className = 'live-dot dead';
  document.getElementById('status').style.display = 'none';
  const el = document.getElementById('err');
  el.style.display = 'block';
  el.textContent = '⚠  ' + msg;
}
function flashBadge() {
  const b = document.getElementById('nbadge');
  b.textContent = '✓ LOADED'; b.classList.add('flash');
  setTimeout(() => { b.textContent = 'AUTO 60s'; b.classList.remove('flash'); }, 900);
}

// ── CLOCK ──────────────────────────────────────────────────────────────
setInterval(() => {
  document.getElementById('ts').textContent =
    new Date().toLocaleTimeString('en-US',{hour12:false});
}, 1000);

// ── COUNTDOWN ──────────────────────────────────────────────────────────
let cd = REFRESH_MS / 1000;
setInterval(() => {
  cd--;
  if (cd <= 0) { cd = REFRESH_MS / 1000; loadAll(); }
  const b = document.getElementById('nbadge');
  if (!b.classList.contains('flash')) b.textContent = `AUTO ${cd}s`;
}, 1000);

// ── RESIZE ────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  fixChartHeights();
  const el = document.getElementById('chart-' + currentTab);
  if (el && el.data) Plotly.relayout(el, { autosize: true });
});

// ── INIT ──────────────────────────────────────────────────────────────
// 1. Load persisted settings into state variables BEFORE building UI
loadSettings();

// 2. Build toolbar (reads hiddenSigs + sigStyleOverrides from state)
buildToolbar();

// 3. Restore signal button visuals (colors/styles from overrides)
Object.entries(sigStyleOverrides).forEach(([key, ov]) => {
  const btn = document.querySelector(`.sig-btn[data-sig="${key}"]`);
  if (!btn) return;
  if (ov.color) {
    btn.style.borderColor = ov.color + '70';
    btn.style.color = ov.color;
    const dot = btn.querySelector('.dot');
    if (dot) {
      if (SIGNALS[key]?.line) { dot.style.background = ov.color; }
      else { dot.style.borderColor = ov.color; }
    }
  }
});
syncButtons();

// 4. Restore heatmap toolbar UI
(function restoreHeatmapUI() {
  const hmToggleBtn = document.getElementById('hm-toggle');
  if (hmToggleBtn) {
    hmToggleBtn.textContent = hmEnabled ? 'HM ON' : 'HM OFF';
    hmToggleBtn.classList.toggle('hm-active', hmEnabled);
  }
  document.querySelectorAll('.hm-type-btn').forEach(b => {
    b.classList.toggle('hm-selected', b.dataset.type === hmType);
    b.classList.toggle('hm-off', !hmEnabled);
  });
  document.querySelectorAll('#cs-rdgr,#cs-rdbu,#cs-plasma')
    .forEach(b => b.classList.toggle('hm-off', !hmEnabled));
  const idMap = { RdGr:'cs-rdgr', RdBu:'cs-rdbu', Plasma:'cs-plasma' };
  document.querySelectorAll('#cs-rdgr,#cs-rdbu,#cs-plasma').forEach(b => b.classList.remove('hm-active'));
  const csActiveEl = document.getElementById(idMap[hmColorscale]);
  if (csActiveEl) csActiveEl.classList.add('hm-active');

  const opSlider = document.getElementById('hm-opacity-slider');
  const opVal    = Math.round(hmOpacity * 100);
  if (opSlider) {
    opSlider.value = opVal;
    opSlider.style.background = `linear-gradient(to right, var(--accent) 0%, var(--accent) ${opVal}%, var(--border2) ${opVal}%)`;
  }
  const opLabel = document.getElementById('hm-opacity-val');
  if (opLabel) opLabel.textContent = opVal + '%';

  const closeInput = document.getElementById('hm-close-time');
  if (closeInput) closeInput.value = hmCloseTimeStr;

  const invBtn = document.getElementById('hm-inv-toggle');
  const invLbl = document.getElementById('hm-mode-label');
  if (invBtn) invBtn.classList.toggle('hm-active', hmInvMode);
  if (invLbl) {
    invLbl.textContent = hmInvMode ? 'INV' : 'LIVE';
    invLbl.style.color = hmInvMode ? 'var(--yellow)' : 'var(--text3)';
  }

  // Hover button
  const hbtn = document.getElementById('btn-hover');
  if (hbtn) {
    hbtn.textContent = hoverOn ? 'HOVER ●' : 'HOVER ○';
    hbtn.classList.toggle('active-btn', hoverOn);
  }

  // Toolbar open state
  if (toolbarOpen) {
    document.getElementById('toolbar').classList.add('expanded');
    document.getElementById('toolbar-toggle').classList.add('open');
  }
})();

updateAnchorBadge();
loadAll();
</script>
