    <script>
        const RANGE_STORAGE_KEY = 'plotly_heatmap_ranges_nq_heatmap_vomma';

        window.addEventListener('load', () => {
            const gd = document.querySelector('.js-plotly-plot');
            const savedLayout = JSON.parse(localStorage.getItem(RANGE_STORAGE_KEY));

            // Restaurar rango de ejes específico de este heatmap
            if (savedLayout && gd) {
                Plotly.relayout(gd, savedLayout);
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            const gd = document.querySelector('.js-plotly-plot');
            if (!gd) return;

            // Guardar rango de ejes específico de este heatmap
            gd.on('plotly_relayout', function(eventData) {
                const ranges = {};
                for (const key in eventData) {
                    if (key.includes('range')) {
                        ranges[key] = eventData[key];
                    }
                }
                if (Object.keys(ranges).length > 0) {
                    localStorage.setItem(RANGE_STORAGE_KEY, JSON.stringify(ranges));
                }
            });
        });
    </script>
