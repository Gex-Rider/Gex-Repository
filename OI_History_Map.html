<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OI History Map · SPY · QQQ</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
:root{
  --bg:#06090d;--bg2:#0b0f14;--bg3:#0f1419;
  --border:#1a2332;--text:#d0d8e4;--text2:#7a8fa8;--text3:#3d5068;
  --accent:#4a9eff;--green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:11px;}
body{display:flex;flex-direction:column;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:14px;font-weight:700;letter-spacing:.1em;color:var(--accent);}
.logo em{color:var(--text2);font-style:normal;font-weight:300;}
.hdr-r{display:flex;align-items:center;gap:10px;font-size:10px;color:var(--text2);}

/* TABS */
nav{display:flex;gap:1px;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{padding:6px 14px;cursor:pointer;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text2);background:transparent;border:none;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;padding:6px 16px;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.tb-lbl{font-size:9px;color:var(--text3);letter-spacing:.1em;}
.tb-ctrl{display:flex;align-items:center;gap:6px;}
.tb-ctrl label{font-size:9px;color:var(--text2);}
input[type=range]{width:80px;accent-color:var(--accent);}
.tb-val{font-size:9px;color:var(--accent);min-width:24px;}
.tb-btn{padding:3px 8px;font-family:var(--mono);font-size:9px;background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:2px;cursor:pointer;letter-spacing:.06em;}
.tb-btn:hover{border-color:var(--accent);color:var(--accent);}
.tb-btn.active{border-color:var(--accent);color:var(--accent);background:#4a9eff12;}

/* MAIN SPLIT */
main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.panel{display:none;flex:1;min-height:0;flex-direction:column;}
.panel.active{display:flex;}

/* SPLIT: table left, chart right */
.split{display:flex;flex:1;min-height:0;overflow:hidden;}
.left-pane{overflow:auto;border-right:1px solid var(--border);flex-shrink:0;}
.right-pane{flex:1;min-width:0;position:relative;}
.chart-div{width:100%;height:100%;}

/* HEATMAP TABLE */
.hm-table{border-collapse:collapse;font-size:10px;}
.hm-table th,
.hm-table td{padding:2px 5px;text-align:right;white-space:nowrap;border:1px solid #0d1520;}
.hm-table .h-strike{text-align:center;background:var(--bg3);color:var(--text2);font-weight:600;position:sticky;left:0;z-index:5;border-right:1px solid var(--border);min-width:56px;}
.hm-table thead th{background:var(--bg3);position:sticky;top:0;z-index:10;font-size:9px;color:var(--text2);letter-spacing:.06em;text-align:center;}
.hm-table thead th.h-strike{z-index:15;}
.hm-table .flip-cell{background:rgba(234,179,8,.25)!important;color:var(--yellow)!important;font-weight:700;outline:1px solid #eab308;outline-offset:-1px;}
.hm-table .top-pos{outline:1.5px solid var(--green);outline-offset:-1px;}
.hm-table .top-neg{outline:1.5px solid var(--red);outline-offset:-1px;}
.hm-table .spot-strike th{color:var(--accent)!important;background:#4a9eff14!important;}

/* RESIZE HANDLE */
.resize-handle{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;}
.resize-handle:hover{background:var(--accent);}

/* Legend */
.legend{display:flex;align-items:center;gap:10px;padding:4px 16px;background:var(--bg2);border-top:1px solid var(--border);font-size:9px;color:var(--text3);flex-shrink:0;}
.lsw{width:14px;height:10px;border-radius:1px;}
</style>
</head>
<body>
<header>
  <div class="logo">SPY · QQQ <em>· OI HISTORY MAP</em></div>
  <div class="hdr-r">
    <span id="ts">--:--:--</span>
    <span style="color:var(--text3)">|</span>
    <span>Cargado: <span style="color:var(--accent)" id="loaded-info">–</span></span>
  </div>
</header>
<nav id="tabs-nav"></nav>
<div class="toolbar">
  <span class="tb-lbl">TEXTO</span>
  <div class="tb-ctrl">
    <label>Opacidad min</label>
    <input type="range" id="op-min" min="0" max="100" value="15">
    <span class="tb-val" id="op-min-v">15%</span>
  </div>
  <div class="tb-ctrl">
    <label>Opacidad max</label>
    <input type="range" id="op-max" min="0" max="100" value="100">
    <span class="tb-val" id="op-max-v">100%</span>
  </div>
  <span class="tb-lbl" style="margin-left:8px">VELAS</span>
  <button class="tb-btn active" id="btn-candles" onclick="toggleCandles()">MOSTRAR</button>
  <span class="tb-lbl" style="margin-left:8px">TABLA</span>
  <input type="range" id="tbl-width" min="200" max="900" value="420" oninput="resizeTable(this.value)">
  <span class="tb-val" id="tbl-w-v">420px</span>
</div>
<main>
  <div id="panels"></div>
</main>
<div class="legend">
  <div class="lsw" style="background:rgba(34,197,94,.55)"></div>MAX POS
  <div class="lsw" style="background:rgba(34,197,94,.15)"></div>POS
  <div class="lsw" style="background:transparent;border:1px solid var(--border)"></div>CERO
  <div class="lsw" style="background:rgba(239,68,68,.15)"></div>NEG
  <div class="lsw" style="background:rgba(239,68,68,.55)"></div>MAX NEG
  <div class="lsw" style="background:rgba(234,179,8,.25);outline:1px solid #eab308;outline-offset:-1px"></div>FLIP
  <div class="lsw" style="outline:1.5px solid #22c55e;outline-offset:-1px;background:transparent"></div>TOP+
  <div class="lsw" style="outline:1.5px solid #ef4444;outline-offset:-1px;background:transparent"></div>TOP-
</div>

const ACTIVOS = Object.keys(DATA);

let currentTab  = ACTIVOS[0];
let showCandles = true;
let opMin = 15 / 100;
let opMax = 100 / 100;

// ── INIT ──────────────────────────────────────────────────────────────
function init() {
  buildTabs();
  buildAllPanels();
  document.getElementById('loaded-info').textContent =
    ACTIVOS.length + ' activos · ' + new Date().toLocaleDateString();
}

function buildTabs() {
  const nav = document.getElementById('tabs-nav');
  nav.innerHTML = '';
  ACTIVOS.forEach(a => {
    const b = document.createElement('button');
    b.className = 'tab' + (a === currentTab ? ' active' : '');
    b.textContent = a;
    b.onclick = () => { currentTab = a; activateTab(a); };
    nav.appendChild(b);
  });
}

function activateTab(a) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent === a));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + a));
  const el = document.getElementById('chart-' + a);
  if (el && el.data) Plotly.relayout(el, {autosize:true});
}

function buildAllPanels() {
  const c = document.getElementById('panels');
  c.style.cssText = 'flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;';
  c.innerHTML = '';
  ACTIVOS.forEach(a => {
    const panel = document.createElement('div');
    panel.className = 'panel' + (a === currentTab ? ' active' : '');
    panel.id = 'panel-' + a;
    panel.innerHTML = buildPanelHTML(a);
    c.appendChild(panel);
  });
  // wire resize handles
  document.querySelectorAll('.resize-handle').forEach(h => {
    let dragging = false, startX = 0, startW = 0;
    h.addEventListener('mousedown', e => {
      dragging = true; startX = e.clientX;
      startW = h.previousElementSibling.offsetWidth;
      document.body.style.cursor = 'col-resize';
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const lp = h.previousElementSibling;
      const newW = Math.max(150, Math.min(startW + e.clientX - startX, window.innerWidth - 200));
      lp.style.width = newW + 'px';
      document.getElementById('tbl-width').value = newW;
      document.getElementById('tbl-w-v').textContent = newW + 'px';
    });
    document.addEventListener('mouseup', () => { dragging = false; document.body.style.cursor = ''; });
  });
  // render charts after DOM
  requestAnimationFrame(() => ACTIVOS.forEach(a => renderChart(a)));
}

function buildPanelHTML(activo) {
  const d = DATA[activo];
  if (!d) return '<div style="padding:40px;color:var(--text3);text-align:center">Sin datos · ' + activo + '</div>';
  return `
    <div class="split" id="split-${activo}">
      <div class="left-pane" id="left-${activo}" style="width:420px">
        ${buildHeatmapTable(activo, d)}
      </div>
      <div class="resize-handle"></div>
      <div class="right-pane">
        <div class="chart-div" id="chart-${activo}"></div>
      </div>
    </div>`;
}

// ── HEATMAP TABLE ─────────────────────────────────────────────────────
function buildHeatmapTable(activo, d) {
  const strikes  = d.strikes;
  const exps     = d.exp_dates;
  const matrix   = d.oi_matrix;
  const flips    = d.flips;
  const topPos   = d.top_pos;
  const topNeg   = d.top_neg;

  // global abs max for color scaling
  let gMax = 0;
  exps.forEach(exp => {
    const col = matrix[exp] || {};
    strikes.forEach(K => { const v = Math.abs(col[K] || 0); if (v > gMax) gMax = v; });
  });

  let html = '<table class="hm-table"><thead><tr>';
  html += '<th class="h-strike">STRIKE</th>';
  exps.forEach(exp => {
    const d = new Date(exp);
    const lbl = (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getDate().toString().padStart(2,'0');
    html += `<th title="${exp}">${lbl}</th>`;
  });
  html += '</tr></thead><tbody>';

  strikes.forEach(K => {
    html += '<tr>';
    html += `<th class="h-strike">${K}</th>`;
    exps.forEach(exp => {
      const col  = matrix[exp] || {};
      const v    = col[K] || 0;
      const isFlip   = flips[exp] && Math.abs(K - flips[exp]) < 0.51;
      const isTopPos = topPos[exp] === K;
      const isTopNeg = topNeg[exp] === K;

      const bg   = heatBg(v, gMax);
      const op   = textOpacity(v, gMax);
      let cls    = '';
      if (isFlip)   cls += ' flip-cell';
      if (isTopPos) cls += ' top-pos';
      if (isTopNeg) cls += ' top-neg';

      const disp = v !== 0 ? fmtK(v) : '';
      html += `<td class="${cls.trim()}" style="background:${bg};color:rgba(208,216,228,${op})">${disp}</td>`;
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  return html;
}

function heatBg(v, gMax) {
  if (v === 0 || gMax === 0) return 'transparent';
  const r = Math.abs(v) / gMax;
  const alpha = 0.05 + r * 0.55;
  return v > 0
    ? `rgba(34,197,94,${alpha.toFixed(2)})`
    : `rgba(239,68,68,${alpha.toFixed(2)})`;
}

function textOpacity(v, gMax) {
  if (v === 0 || gMax === 0) return opMin.toFixed(2);
  const r = Math.abs(v) / gMax;
  return (opMin + r * (opMax - opMin)).toFixed(2);
}

// ── CANDLESTICK CHART ─────────────────────────────────────────────────
function renderChart(activo) {
  const d   = DATA[activo];
  if (!d) return;
  const el  = document.getElementById('chart-' + activo);
  if (!el)  return;

  const h = el.parentElement.offsetHeight || 500;
  el.style.height = h + 'px';

  const candles = d.candles;
  const exps    = d.exp_dates;
  const traces  = [];

  if (showCandles && candles.length > 0) {
    traces.push({
      type: 'candlestick',
      x:    candles.map(c => c.dt),
      open: candles.map(c => c.o),
      high: candles.map(c => c.h),
      low:  candles.map(c => c.l),
      close:candles.map(c => c.c),
      name: activo,
      increasing: {line:{color:'#22c55e'}, fillcolor:'#22c55e'},
      decreasing: {line:{color:'#ef4444'}, fillcolor:'#ef4444'},
      hovertemplate: '<b>%{x}</b><br>O:%{open:.2f} H:%{high:.2f} L:%{low:.2f} C:%{close:.2f}<extra></extra>',
    });
  }

  // Vertical lines at each expiration date
  const shapes = exps.map(exp => ({
    type: 'line',
    x0: exp + 'T00:00:00', x1: exp + 'T23:59:00',
    y0: 0, y1: 1, yref: 'paper',
    line: {color:'rgba(74,158,255,.25)', width:1, dash:'dot'},
  }));

  // Annotations — date labels on top
  const annotations = exps.map(exp => {
    const d = new Date(exp);
    const lbl = (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getDate().toString().padStart(2,'0');
    return {
      x: exp + 'T12:00:00', y: 1, yref: 'paper',
      text: lbl, showarrow: false,
      font: {size:9, color:'#4a9eff88', family:'JetBrains Mono'},
      xanchor: 'center', yanchor: 'bottom',
    };
  });

  const layout = {
    autosize: true,
    paper_bgcolor: '#06090d',
    plot_bgcolor:  '#0b0f14',
    font: {family:'JetBrains Mono,monospace', color:'#7a8fa8', size:10},
    margin: {l:55, r:10, t:30, b:40},
    title: {text: activo + ' · 2H', font:{color:'#d0d8e4', size:12}, x:0.02, xanchor:'left'},
    xaxis: {
      type: 'date',
      color:'#3d5068', gridcolor:'#1a2332',
      rangeslider: {visible:false},
      tickfont:{size:9},
    },
    yaxis: {color:'#3d5068', gridcolor:'#1a2332', tickfont:{size:9}},
    shapes, annotations,
    hovermode: 'x',
    hoverlabel: {bgcolor:'#0f1419', font:{family:'JetBrains Mono', size:10}},
  };

  Plotly.react(el, traces, layout, {responsive:true, displayModeBar:true, displaylogo:false});
}

// ── CONTROLS ──────────────────────────────────────────────────────────
function toggleCandles() {
  showCandles = !showCandles;
  document.getElementById('btn-candles').classList.toggle('active', showCandles);
  document.getElementById('btn-candles').textContent = showCandles ? 'MOSTRAR' : 'OCULTO';
  ACTIVOS.forEach(a => renderChart(a));
}

document.getElementById('op-min').addEventListener('input', function() {
  opMin = this.value / 100;
  document.getElementById('op-min-v').textContent = this.value + '%';
  rebuildTables();
});
document.getElementById('op-max').addEventListener('input', function() {
  opMax = this.value / 100;
  document.getElementById('op-max-v').textContent = this.value + '%';
  rebuildTables();
});

function rebuildTables() {
  ACTIVOS.forEach(a => {
    const lp = document.getElementById('left-' + a);
    if (lp) lp.innerHTML = buildHeatmapTable(a, DATA[a]);
  });
}

function resizeTable(w) {
  document.getElementById('tbl-w-v').textContent = w + 'px';
  ACTIVOS.forEach(a => {
    const lp = document.getElementById('left-' + a);
    if (lp) lp.style.width = w + 'px';
  });
}

// ── UTILS ─────────────────────────────────────────────────────────────
function fmtK(v) {
  const a = Math.abs(v);
  if (a >= 1e6) return (v/1e6).toFixed(1)+'M';
  if (a >= 1e3) return (v/1e3).toFixed(0)+'K';
  return v.toFixed(0);
}

setInterval(() => {
  document.getElementById('ts').textContent =
    new Date().toLocaleTimeString('en-US',{hour12:false});
}, 1000);

window.addEventListener('resize', () => {
  ACTIVOS.forEach(a => {
    const el = document.getElementById('chart-' + a);
    if (el && el.data) Plotly.relayout(el, {autosize:true});
  });
});

// ── START ─────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
