<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OI History Map v2 · SPY · QQQ</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
:root{--bg:#06090d;--bg2:#0b0f14;--bg3:#0f1419;--border:#1a2332;--text:#d0d8e4;--text2:#7a8fa8;--text3:#3d5068;--accent:#4a9eff;--mono:'JetBrains Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:11px;overflow:hidden;}
body{display:flex;flex-direction:column;}
header{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:13px;font-weight:700;letter-spacing:.1em;color:var(--accent);}
.logo em{color:var(--text2);font-style:normal;font-weight:300;}
.hdr-r{display:flex;align-items:center;gap:12px;font-size:10px;color:var(--text2);}
#ts{font-size:10px;color:var(--text3);}
nav{display:flex;gap:1px;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.tab{padding:6px 14px;cursor:pointer;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text2);background:transparent;border:none;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.toolbar{display:flex;align-items:center;gap:10px;padding:5px 16px;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.tb-lbl{font-size:9px;color:var(--text3);letter-spacing:.08em;}
.tb-ctrl{display:flex;align-items:center;gap:5px;}
.tb-ctrl label{font-size:9px;color:var(--text2);}
input[type=range]{width:75px;accent-color:var(--accent);}
.tb-val{font-size:9px;color:var(--accent);min-width:22px;}
.tb-btn{padding:3px 8px;font-family:var(--mono);font-size:9px;background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:2px;cursor:pointer;letter-spacing:.06em;}
.tb-btn:hover,.tb-btn.on{border-color:var(--accent);color:var(--accent);background:#4a9eff10;}
main{flex:1;overflow:hidden;position:relative;}
.panel{display:none;position:absolute;inset:0;}
.panel.active{display:block;}
.chart-el{width:100%;height:100%;}
.legend{display:flex;align-items:center;gap:10px;padding:4px 16px;background:var(--bg2);border-top:1px solid var(--border);font-size:9px;color:var(--text3);flex-shrink:0;flex-wrap:wrap;}
.lsw{width:13px;height:9px;border-radius:1px;display:inline-block;}
</style>
</head>
<body>
<header>
  <div class="logo">OI HISTORY <em>· MAP v2</em></div>
  <div class="hdr-r">
    <span id="ts">--:--:--</span>
  </div>
</header>
<nav id="nav"></nav>
<div class="toolbar">
  <span class="tb-lbl">TEXTO</span>
  <div class="tb-ctrl">
    <label>Opacidad min</label>
    <input type="range" id="op-min" min="0" max="100" value="12" oninput="onOpMin(this.value)">
    <span class="tb-val" id="op-min-v">12%</span>
  </div>
  <div class="tb-ctrl">
    <label>max</label>
    <input type="range" id="op-max" min="0" max="100" value="100" oninput="onOpMax(this.value)">

  </div>
  <div style="width:1px;height:18px;background:var(--border);margin:0 4px;"></div>
  <span class="tb-lbl">HEATMAP</span>
  <div class="tb-ctrl">
    <label>Altura %</label>
    <input type="range" id="hm-size" min="10" max="70" value="45" oninput="onHmSize(this.value)">

  </div>
  <div style="width:1px;height:18px;background:var(--border);margin:0 4px;"></div>
  <button class="tb-btn on" id="btn-text" onclick="toggleText()">TEXTO</button>
  <button class="tb-btn on" id="btn-candles" onclick="toggleCandles()">VELAS</button>
  <button class="tb-btn on" id="btn-hm" onclick="toggleHeatmap()">HEATMAP</button>
</div>
<main><div id="panels"></div></main>

</div>

function init() {
  const nav = document.getElementById('nav');
  ACTIVOS.forEach(a => {
    const b = document.createElement('button');
    b.className = 'tab' + (a === currentTab ? ' active' : '');
    b.textContent = a;
    b.onclick = () => { currentTab = a; switchTab(a); };
    nav.appendChild(b);
  });

  const c = document.getElementById('panels');
  c.style.cssText = 'position:absolute;inset:0;';
  ACTIVOS.forEach(a => {
    const div = document.createElement('div');
    div.className = 'panel' + (a === currentTab ? ' active' : '');
    div.id = 'panel-' + a;
    div.innerHTML = `<div id="chart-${a}" class="chart-el"></div>`;
    c.appendChild(div);
  });

  requestAnimationFrame(() => ACTIVOS.forEach(a => renderChart(a)));
}

function switchTab(a) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent === a));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + a));
  const el = document.getElementById('chart-' + a);
  if (el && el.data) Plotly.relayout(el, {autosize: true});
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderChart(activo) {
  const d  = ALL_DATA[activo];
  if (!d) return;
  const el = document.getElementById('chart-' + activo);
  if (!el) return;

  const traces   = [];
  const extraAnn = d.annotations || [];

  // Velas
  if (showCandles && d.candle_trace) {
    traces.push(d.candle_trace);
  }

  // Heatmap + markers
  if (showHeatmap) {
    const hmTrace = JSON.parse(JSON.stringify(d.hm_trace));
    // Texto: mostrar o no según toggle + opacidad proporcional
    if (showText) {
      hmTrace.texttemplate = "%{text}";
      // recalcular opacidad individual no es posible directo en Plotly heatmap,
      // pero usamos font.color con opacidad fija (min+50%)
      hmTrace.textfont = {size: 8, color: `rgba(208,216,228,${((opMin+opMax)/2).toFixed(2)})`};
    } else {
      hmTrace.texttemplate = "";
    }
    traces.push(hmTrace);
    if (d.top_pos_trace) traces.push(d.top_pos_trace);
    if (d.top_neg_trace) traces.push(d.top_neg_trace);
  }

  const layout = JSON.parse(JSON.stringify(d.layout));
  layout.annotations = (layout.annotations || []).concat(
    showHeatmap ? extraAnn : []
  );

  // Ajustar dominios según hmPct
  const candleDomain = [hmPct + 0.02, 1.0];
  const hmDomain     = [0, hmPct - 0.02];
  layout.yaxis.domain  = candleDomain;
  layout.yaxis2.domain = hmDomain;

  // Ajustar anotaciones de expiración al borde
  layout.annotations.forEach(ann => {
    if (ann.yref === 'paper' && ann.y !== undefined) {
      ann.y = hmPct + 0.005;
    }
  });

  Plotly.react(el, traces, layout, {
    responsive: true,
    displayModeBar: true,
    modeBarButtonsToRemove: ['toImage', 'sendDataToCloud'],
    displaylogo: false,
  });
}

// ── CONTROLS ──────────────────────────────────────────────────────────
function toggleText() {
  showText = !showText;
  document.getElementById('btn-text').classList.toggle('on', showText);
  ACTIVOS.forEach(a => renderChart(a));
}
function toggleCandles() {
  showCandles = !showCandles;
  document.getElementById('btn-candles').classList.toggle('on', showCandles);
  ACTIVOS.forEach(a => renderChart(a));
}
function toggleHeatmap() {
  showHeatmap = !showHeatmap;
  document.getElementById('btn-hm').classList.toggle('on', showHeatmap);
  ACTIVOS.forEach(a => renderChart(a));
}
function onOpMin(v) {
  opMin = v / 100;
  document.getElementById('op-min-v').textContent = v + '%';
  ACTIVOS.forEach(a => renderChart(a));
}
function onOpMax(v) {
  opMax = v / 100;
  document.getElementById('op-max-v').textContent = v + '%';
  ACTIVOS.forEach(a => renderChart(a));
}
function onHmSize(v) {
  hmPct = v / 100;
  document.getElementById('hm-size-v').textContent = v + '%';
  ACTIVOS.forEach(a => renderChart(a));
}

setInterval(() => {
  document.getElementById('ts').textContent =
    new Date().toLocaleTimeString('en-US', {hour12: false});
}, 1000);

window.addEventListener('resize', () => {
  ACTIVOS.forEach(a => {
    const el = document.getElementById('chart-' + a);
    if (el && el.data) Plotly.relayout(el, {autosize: true});
  });
});

init();
</script>
</body>
</html>
